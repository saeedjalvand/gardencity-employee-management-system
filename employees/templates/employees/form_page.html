{% extends 'employees/base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="glass-card p-4 p-lg-5">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div>
            <h1 class="page-title">{{ title }}</h1>
            <div class="page-subtitle">فۆرمی تۆمارکردنی زانیاری</div>
        </div>
        <a href="{{ back_url }}" class="btn btn-secondary">گەڕانەوە</a>
    </div>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn brand-gradient">پاشەکەوتکردن</button>
            <a href="{{ back_url }}" class="btn btn-outline-secondary">هەڵوەشاندنەوە</a>
        </div>
    </form>
</div>
{% endblock %}
